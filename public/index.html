<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>위대한 달무티 - 멀티플레이어</title>
    <link rel="manifest" href="/manifest.json">
    
    <!-- ⭐️ Firebase SDK 추가 (호환성 버전) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; user-select: none; }
        body { margin: 0; padding: 0; background-color: #1a1a1a; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; overscroll-behavior: none; }
        .hidden { display: none !important; }
        .btn { padding: 10px 18px; font-size: 15px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; background-color: #f1c40f; color: #333; box-shadow: 0 4px 0 #d4ac0d; transition: all 0.1s; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn.pass { background-color: #e74c3c; box-shadow: 0 4px 0 #c0392b; color: white; }
        .btn.back { background-color: #95a5a6; box-shadow: 0 4px 0 #7f8c8d; color: white; }
        .btn:disabled { background-color: #7f8c8d !important; box-shadow: 0 4px 0 #555 !important; color: #ccc !important; transform: none !important; cursor: not-allowed; }
        .screen { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: rgba(26, 26, 26, 0.98); z-index: 10; }
        
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; width: 280px; }
        .input-group input { padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #555; background: #333; color: white; text-align: center; margin-bottom: 5px; }
        
        .avatar-selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .avatar-opt { width: 42px; height: 42px; font-size: 20px; display: flex; justify-content: center; align-items: center; background: #2c3e50; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.2s;}
        .avatar-opt.selected { border-color: #f1c40f; box-shadow: 0 0 10px #f1c40f; transform: scale(1.1);}

        /* (중략) 기존 CSS 디자인 유지... (이전 버전의 CSS가 그대로 유지됩니다) */
        
        .table-3d { width: 85vw; max-width: 700px; height: 35vh; max-height: 280px; background: radial-gradient(circle, #2d8659, #1b4d3e); border: 15px solid #5c4033; border-radius: 25px; transform: rotateX(40deg) translateY(-2vh); position: relative; transform-style: preserve-3d; box-shadow: 0 20px 40px rgba(0,0,0,0.8); margin-top: 5vh; }
        .center-area { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) translateZ(10px); display: flex; justify-content: center; align-items: center; z-index: 2; width: 100%; height: 100%; }
        
        #opponents-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 6; }
        .ai-node { position: absolute; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.85); border: 2px solid #444; border-radius: 25px; padding: 4px 12px 4px 4px; --tx: 0%; --scale: 0.92; transform: translateX(var(--tx)) scale(var(--scale)); transition: all 0.2s; }
        .ai-node .avatar { width: 34px; height: 34px; font-size: 18px; border-radius: 50%; background: #2c3e50; display: flex; justify-content: center; align-items: center; transition: all 0.3s; background-size: cover; background-position: center; }
        .ai-node .info { display: flex; flex-direction: column; }
        .ai-node .name { font-size: 13px; color: #fff; font-weight: bold; transition: color 0.3s; text-shadow: 1px 1px 2px #000; }
        .ai-node .count { font-size: 11px; color: #f1c40f; font-weight: bold; }
        
        .pos-left-low   { top: 22%; left: max(15px, env(safe-area-inset-left)); }
        .pos-left-mid   { top: 2%; left: max(25px, env(safe-area-inset-left)); }
        .pos-left-high  { top: 2%; left: 30%; --tx: -50%; }
        .pos-center-top { top: 2%; left: 50%; --tx: -50%; }
        .pos-right-high { top: 2%; left: 70%; --tx: -50%; }
        .pos-right-mid  { top: 2%; right: max(25px, env(safe-area-inset-right)); }
        .pos-right-low  { top: 22%; right: max(15px, env(safe-area-inset-right)); }

        .player-ui { position: absolute; bottom: 0; left: 0; width: 100%; padding-bottom: max(12px, env(safe-area-inset-bottom)); background: linear-gradient(to top, rgba(0,0,0,0.95) 45%, transparent); display: flex; flex-direction: column; align-items: center; z-index: 5; pointer-events: none; }
        .hud-layer { width: 100%; display: flex; justify-content: space-between; align-items: flex-end; padding: 0 max(15px, env(safe-area-inset-left)) 0 max(15px, env(safe-area-inset-left)); margin-bottom: -5px; z-index: 20; }
        .hud-left { pointer-events: auto; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.7); padding: 6px 12px 6px 6px; border-radius: 30px; border: 1px solid #555;}
        .hud-right { pointer-events: auto; display: flex; align-items: center; gap: 8px; }
        
        .btn-emote { background: #34495e; border: 2px solid #f1c40f; color:#fff; border-radius: 50%; width: 42px; height: 42px; font-size: 18px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.6); transition: transform 0.1s; }
        .btn-pause { position: absolute; top: max(15px, env(safe-area-inset-top)); right: max(15px, env(safe-area-inset-right)); background: rgba(0,0,0,0.7); border: 2px solid #555; color: #fff; border-radius: 50%; width: 42px; height: 42px; font-size: 16px; display: flex; justify-content: center; align-items: center; z-index: 50; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        
        .hand-scroll-area { width: 100%; overflow-y: visible; overflow-x: auto; padding-top: 50px; padding-bottom: 5px; -webkit-overflow-scrolling: touch; pointer-events: auto; }
        .hand-scroll-area::-webkit-scrollbar { display: none; }
        .hand { display: flex; width: max-content; margin: 0 auto; padding: 0 40px; }
        .hand .card { margin-left: -15px; flex-shrink: 0; box-shadow: -5px 0px 12px rgba(0,0,0,0.5); }

        /* 카드 디자인 유지 */
        .card {
            width: 54px; height: 78px; background-color: #eaddcf;
            border-radius: 6px; display: flex; flex-direction: column; justify-content: space-between;
            padding: 4px; cursor: pointer; position: relative; border: 2px solid #5c4033;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.4), inset 0 0 8px rgba(139,69,19,0.2);
            transition: transform 0.15s, border-color 0.15s; color: #3b2a1a;
        }
        .card.selected { transform: translateY(-30px) !important; border-color: #e74c3c; border-width: 3px; box-shadow: 0 10px 20px rgba(231, 76, 60, 0.5); z-index: 10; }
        .card .number { font-size: 13px; font-weight: bold; }
        .card .number.bottom { align-self: flex-end; transform: rotate(180deg); }
        .card .center-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; width: 100%; text-shadow: 1px 1px 0px rgba(255,255,255,0.4); }

        #game-status { position: absolute; top: 16%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 5px 18px; border-radius: 20px; font-size: 13px; font-weight: bold; color: #f1c40f; z-index: 20; border: 1px solid rgba(241, 196, 15, 0.4); text-align: center; }
        #chat-toast-area { position: absolute; bottom: 25%; left: 50%; transform: translateX(-50%); width: 70vw; max-width: 420px; background: rgba(0,0,0,0.85); color: #f1c40f; font-weight: bold; border: 1px solid rgba(241,196,15,0.3); padding: 8px 16px; border-radius: 12px; text-align: center; font-size: 14px; z-index: 99; pointer-events: none;}
    </style>
</head>
<body>

    <!-- 로비 -->
    <div id="lobby-screen" class="screen">
        <h1 style="color: #f1c40f; font-size: 32px; margin-bottom: 25px;">👑 위대한 달무티 멀티</h1>
        
        <!-- ⭐️ 새로 추가된 회원가입 / 로그인 창 (Step 0) -->
        <div id="step-0-auth" class="input-group">
            <h3 style="color:#aaa; font-size:14px; text-align:center; margin-top:0;">로그인 / 회원가입</h3>
            <input type="email" id="auth-email" placeholder="이메일 주소">
            <input type="password" id="auth-password" placeholder="비밀번호 (6자리 이상)">
            <button class="btn" onclick="loginUser()">로그인</button>
            <button class="btn back" onclick="registerUser()">새로 회원가입</button>
            <p id="auth-msg" style="color:#e74c3c; font-size:12px; text-align:center; margin:0;"></p>
        </div>

        <!-- 기존 아바타 및 닉네임 창 (Step 1) -->
        <div id="step-1-nickname" class="input-group hidden">
            <h3 style="color:#aaa; font-size:14px; text-align:center; margin-top:0;">내 캐릭터 선택</h3>
            <div class="avatar-selector">
                <div class="avatar-opt selected" onclick="selectAvatar(this, '🧑‍💻')">🧑‍💻</div>
                <div class="avatar-opt" onclick="selectAvatar(this, '🦊')">🦊</div>
                <div class="avatar-opt" onclick="selectAvatar(this, '🐰')">🐰</div>
                <div class="avatar-opt" onclick="selectAvatar(this, '🐶')">🐶</div>
                <label class="avatar-opt" id="avatar-preview-img" style="overflow: hidden; display:flex; justify-content:center; align-items:center; background:#444; font-size:15px; border:2px dashed #95a5a6; cursor:pointer;">
                    📷
                    <input type="file" accept="image/*" style="display:none;" onchange="handleImageUpload(event)">
                </label>
            </div>
            <input type="text" id="player-name" placeholder="사용할 닉네임 입력" maxlength="8">
            <button class="btn" onclick="goToStep2()">아바타 설정 완료</button>
        </div>

        <div id="step-2-action" class="input-group hidden">
            <h3 style="text-align:center; margin-top:0; color:#ccc;">환영합니다, <span id="display-nickname" style="color:#f1c40f;"></span>님!</h3>
            <button class="btn" onclick="createRoomReq()">새로운 방 만들기</button>
            <button class="btn" style="background:#3498db; box-shadow:0 4px 0 #2980b9; color:#fff;" onclick="goToStep3()">기존 방 참가하기</button>
            <button class="btn back" onclick="logoutUser()" style="margin-top:10px; font-size:14px; padding:8px;">← 로그아웃</button>
        </div>

        <div id="step-3-join" class="input-group hidden">
            <h3 style="text-align:center; margin-top:0; color:#ccc;">방 코드를 입력하세요</h3>
            <input type="text" id="room-code-input" placeholder="초대 코드 4자리 입력" maxlength="4">
            <button class="btn" style="background:#3498db; box-shadow:0 4px 0 #2980b9; color:#fff;" onclick="joinRoom()">참가 확인</button>
            <button class="btn back" onclick="goToStep2()" style="margin-top:10px; font-size:14px; padding:8px;">← 뒤로 가기</button>
        </div>
    </div>

    <!-- (이하 대기실, 게임화면 HTML 등 기존 코드 그대로 유지) -->
    <!-- 지면상 생략 없이 게임 화면 등 모두 복사하신 그대로 넣어주시면 됩니다.
         기존 <div id="waiting-screen"> 부터 </div> 부분까지 그대로 두시면 됩니다. -->
    
    <!-- (이전 응답의 HTML 요소들 그대로 유지...) -->

    <script>
        const socket = io();
        let myId = null;
        let myHand = [];
        let selectedIndices = [];
        let taxTargetId = null;
        let taxCountRequired = 0;
        let currentPlayerName = "";
        let currentAvatar = "🧑‍💻";

        // ⭐️ 1단계에서 복사한 Firebase 설정 키를 여기에 붙여넣으세요! ⭐️
        const firebaseConfig = {
            apiKey: "AIzaSyC7bKX8VgfR2_bzC2KWAdK6ac3ieJaTCxg",
              authDomain: "dalmuti-multi.firebaseapp.com",
              projectId: "dalmuti-multi",
              storageBucket: "dalmuti-multi.firebasestorage.app",
              messagingSenderId: "867724560676",
              appId: "1:867724560676:web:395ccb214138df6eb8cbb1",
              measurementId: "G-YXFKS4XW3Y"
        };
        
        // 파이어베이스 초기화
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // ⭐️ 회원가입 함수
        function registerUser() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value.trim();
            const msgEl = document.getElementById('auth-msg');

            if(!email || password.length < 6) {
                msgEl.innerText = "이메일을 입력하고 비밀번호를 6자리 이상 설정하세요.";
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    msgEl.style.color = '#2ecc71';
                    msgEl.innerText = "회원가입 완료! 로그인 되었습니다.";
                    showAvatarScreen(); // 성공 시 아바타 화면으로 이동
                })
                .catch((error) => {
                    msgEl.style.color = '#e74c3c';
                    msgEl.innerText = "가입 실패: " + error.message;
                });
        }

        // ⭐️ 로그인 함수
        function loginUser() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value.trim();
            const msgEl = document.getElementById('auth-msg');

            if(!email || !password) {
                msgEl.innerText = "이메일과 비밀번호를 입력하세요.";
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    msgEl.innerText = "";
                    showAvatarScreen(); // 성공 시 아바타 화면으로 이동
                })
                .catch((error) => {
                    msgEl.style.color = '#e74c3c';
                    msgEl.innerText = "이메일 또는 비밀번호가 틀렸습니다.";
                });
        }

        // ⭐️ 로그아웃 함수
        function logoutUser() {
            auth.signOut().then(() => {
                document.getElementById('step-2-action').classList.add('hidden');
                document.getElementById('step-0-auth').classList.remove('hidden');
                document.getElementById('auth-email').value = '';
                document.getElementById('auth-password').value = '';
            });
        }

        // 인증 성공 후 화면 전환
        function showAvatarScreen() {
            document.getElementById('step-0-auth').classList.add('hidden');
            document.getElementById('step-1-nickname').classList.remove('hidden');
        }

        // 게임 화면 및 로직 함수들...
        function goToStep2() {
            const nameInput = document.getElementById('player-name').value.trim();
            if(!nameInput) return alert('닉네임을 먼저 입력해주세요.');
            currentPlayerName = nameInput;
            document.getElementById('display-nickname').innerText = currentPlayerName;
            
            // 기존 코드 그대로...
            document.getElementById('step-1-nickname').classList.add('hidden');
            document.getElementById('step-2-action').classList.remove('hidden');
        }

        // ... (나머지 createRoomReq, joinRoom, socket.on 등 이전 답변의 JavaScript 코드 복사 붙여넣기) ...
    </script>
</body>
</html>
