<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>위대한 달무티 - 멀티플레이어</title>
    <link rel="manifest" href="/manifest.json">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; user-select: none; }
        body { margin: 0; padding: 0; background-color: #1a1a1a; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; overscroll-behavior: none; }
        .hidden { display: none !important; }
        .btn { padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; background-color: #f1c40f; color: #333; box-shadow: 0 4px 0 #d4ac0d; margin: 5px; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn.pass { background-color: #e74c3c; box-shadow: 0 4px 0 #c0392b; color: white; }
        .btn:disabled { background-color: #7f8c8d; box-shadow: 0 4px 0 #555; color: #ccc; transform: none; }
        .screen { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: rgba(26, 26, 26, 0.98); z-index: 10; }
        
        /* ⭐️ 검은 바 현상 해결: fixed 포지션과 width/height를 수정하여 대기실/게임 중 완벽 차단 */
        #orientation-warning { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 99999; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        @media screen and (orientation: portrait) {
            #orientation-warning { display: flex; }
        }

        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; width: 280px; }
        .input-group input { padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #555; background: #333; color: white; text-align: center; }
        .lobby-buttons { display: flex; gap: 10px; }

        /* 대기실 리스트 확장 박스 반영 */
        .player-list { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; width: 450px; max-width: 90vw; max-height: 300px; overflow-y: auto; margin-bottom: 20px; border: 1px solid #444;}
        .player-item { padding: 8px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; font-size: 15px;}

        #game-screen { z-index: 1; background: radial-gradient(circle at top, #2b2b2b, #111); perspective: 800px; }
        .table-3d { width: 80vw; max-width: 600px; height: 42vh; max-height: 320px; background: radial-gradient(circle, #2d8659, #1b4d3e); border: 15px solid #5c4033; border-radius: 25px; transform: rotateX(45deg) translateY(-3vh); position: relative; transform-style: preserve-3d; box-shadow: 0 20px 40px
